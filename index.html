<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        #header { background: #1e1e1e; padding: 15px; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #333; }
        #header select { padding: 8px; border-radius: 5px; border: none; background: #333; color: white; flex-grow: 1; font-size: 16px; }
        #chat-box { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; line-height: 1.4; }
        .user-msg { background: #0b93f6; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-msg { background: #2a2a2a; align-self: flex-start; border-bottom-left-radius: 2px; }
        #input-area { display: flex; padding: 15px; background: #1e1e1e; border-top: 1px solid #333; }
        #input-area input { flex-grow: 1; padding: 12px; border-radius: 20px; border: none; background: #333; color: white; outline: none; font-size: 16px;}
        #input-area button { background: #0b93f6; color: white; border: none; padding: 10px 20px; margin-left: 10px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="header">
        <select id="char-select">
            <option value="becky">Becky</option>
            <option value="emma">Emma</option>
            <option value="emily">Emily</option>
        </select>
    </div>

    <div id="chat-box">
        <div class="msg ai-msg">Bot is ready. Say hi!</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chatBox = document.getElementById("chat-box");
        const userInput = document.getElementById("user-input");
        const charSelect = document.getElementById("char-select");

        // The permanent background bridge
        const fixedApiUrl = "https://ravi-private-bot-999.loca.lt/chat";

        // Generate a random user ID for whoever visits the site so their chats don't mix
        let myUserId = localStorage.getItem("publicUserId");
        if (!myUserId) {
            myUserId = "user_" + Math.floor(Math.random() * 1000000);
            localStorage.setItem("publicUserId", myUserId);
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            const char = charSelect.value;
            
            if (!text) return;

            chatBox.innerHTML += `<div class="msg user-msg">${text}</div>`;
            userInput.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(fixedApiUrl, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json", 
                        "Bypass-Tunnel-Reminder": "true" // Auto-bypasses the Localtunnel warning!
                    },
                    body: JSON.stringify({ 
                        message: text, 
                        character: char, 
                        user_id: myUserId 
                    })
                });
                
                const data = await response.json();
                chatBox.innerHTML += `<div class="msg ai-msg">${data.reply}</div>`;
            } catch (err) {
                chatBox.innerHTML += `<div class="msg ai-msg" style="color:red;">Error connecting to Colab. Make sure Colab is running!</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        userInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
